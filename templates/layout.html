<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if title %}{{ title }} — {% endif %}{{ config.site.title }}</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="site-title">{{ config.site.title }}</a>
      <div class="nav-links">
        {% for page in pages %}
        <a href="{{ page.slug }}.html">{{ page.title }}</a>
        {% endfor %}
        <a href="apps/index.html">Apps</a>
      </div>
    </nav>
  </header>
  <main>
    {{ content }}
  </main>
  <script>
    hljs.highlightAll();

    document.querySelectorAll('pre').forEach(pre => {
      const code = pre.querySelector('code');
      if (!code) return;

      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'Copy';

      btn.addEventListener('click', () => {
        navigator.clipboard.writeText(code.textContent).then(() => {
          btn.textContent = 'Copied!';
          setTimeout(() => btn.textContent = 'Copy', 2000);
        });
      });

      pre.style.position = 'relative';
      pre.appendChild(btn);
    });
  </script>
</body>
</html>
